syntax = "proto3";

package calificaciones.v1;

message Empty {}

message EvaluationComponent {
  string id = 1;
  string oferta_curso_id = 2;
  string paralelo_id = 3;
  string nombre = 4;
  string descripcion = 5;
  string tipo = 6;
  double ponderacion = 7;
  double puntaje_maximo = 8;
  string fecha_entrega = 9;
  string estado = 10;
  string creado_en = 11;
  string actualizado_en = 12;
}

message CreateEvaluationComponentRequest {
  string oferta_curso_id = 1;
  string paralelo_id = 2;
  string nombre = 3;
  string descripcion = 4;
  string tipo = 5;
  double ponderacion = 6;
  double puntaje_maximo = 7;
  string fecha_entrega = 8;
}

message UpdateEvaluationComponentRequest {
  string id = 1;
  optional string oferta_curso_id = 2;
  optional string paralelo_id = 3;
  optional string nombre = 4;
  optional string descripcion = 5;
  optional string tipo = 6;
  optional double ponderacion = 7;
  optional double puntaje_maximo = 8;
  optional string fecha_entrega = 9;
  optional string estado = 10;
}

message ComponentIdRequest {
  string id = 1;
}

message ListEvaluationComponentsRequest {
  string oferta_curso_id = 1;
  string paralelo_id = 2;
  string estado = 3;
  int32 limit = 4;
  int32 offset = 5;
}

message EvaluationComponentResponse {
  EvaluationComponent component = 1;
}

message ListEvaluationComponentsResponse {
  repeated EvaluationComponent components = 1;
  int32 total = 2;
  int32 limit = 3;
  int32 offset = 4;
}

message MatriculaAsignatura {
  string codigo = 1;
  string matricula_codigo = 2;
  string estudiante_id = 3;
  string estudiante_cedula = 4;
  string oferta_curso_id = 5;
  string ciclo_acad_codigo = 6;
  string materia_codigo = 7;
  string paralelo_codigo = 8;
  string docente_cedula = 9;
  string nivel_codigo = 10;
  string depen_codigo = 11;
  string estado = 12;
  double nota_final = 13;
  string creado_en = 14;
  string actualizado_en = 15;
}

message CreateMatriculaAsignaturaRequest {
  string codigo = 1;
  string matricula_codigo = 2;
  string estudiante_id = 3;
  string estudiante_cedula = 4;
  string oferta_curso_id = 5;
  string ciclo_acad_codigo = 6;
  string materia_codigo = 7;
  string paralelo_codigo = 8;
  string docente_cedula = 9;
  string nivel_codigo = 10;
  string depen_codigo = 11;
}

message ListMatriculaAsignaturasRequest {
  string codigo = 1;
  string matricula_codigo = 2;
  string estudiante_id = 3;
  string estudiante_cedula = 4;
  string oferta_curso_id = 5;
  string ciclo_acad_codigo = 6;
  string materia_codigo = 7;
  string paralelo_codigo = 8;
  string docente_cedula = 9;
  string estado = 10;
  int32 limit = 11;
  int32 offset = 12;
}

message MatriculaAsignaturaResponse {
  MatriculaAsignatura matricula_asignatura = 1;
}

message ListMatriculaAsignaturasResponse {
  repeated MatriculaAsignatura matricula_asignaturas = 1;
  int32 total = 2;
  int32 limit = 3;
  int32 offset = 4;
}

message Grade {
  string id = 1;
  string matricula_codigo = 2;
  string estudiante_id = 3;
  string oferta_curso_id = 4;
  string componente_id = 5;
  string nombre_evaluacion = 6;
  string tipo = 7;
  double nota = 8;
  double ponderacion = 9;
  string observacion = 10;
  string estado = 11;
  bool publicada = 12;
  string registrada_por = 13;
  string fecha_registro = 14;
  string creado_en = 15;
  string actualizado_en = 16;
  string matricula_asignatura_codigo = 17;
}

message RegisterGradeRequest {
  string matricula_codigo = 1;
  string estudiante_id = 2;
  string componente_id = 3;
  double nota = 4;
  string observacion = 5;
  string registrada_por = 6;
  bool publicar = 7;
  string matricula_asignatura_codigo = 8;
}

message UpdateGradeRequest {
  string id = 1;
  optional string componente_id = 2;
  optional string estudiante_id = 3;
  optional double nota = 4;
  optional string observacion = 5;
  optional string registrada_por = 6;
  optional string estado = 7;
  optional bool publicada = 8;
}

message GradeIdRequest {
  string id = 1;
}

message ListGradesRequest {
  string matricula_codigo = 1;
  string estudiante_id = 2;
  string oferta_curso_id = 3;
  string estado = 4;
  bool solo_publicadas = 5;
  int32 limit = 6;
  int32 offset = 7;
  string matricula_asignatura_codigo = 8;
  string ciclo_acad_codigo = 9;
  string materia_codigo = 10;
  string paralelo_codigo = 11;
  string estudiante_cedula = 12;
}

message GradeResponse {
  Grade grade = 1;
}

message ListGradesResponse {
  repeated Grade grades = 1;
  int32 total = 2;
  int32 limit = 3;
  int32 offset = 4;
}

message PublishGradesRequest {
  string matricula_codigo = 1;
  string publicada_por = 2;
  string matricula_asignatura_codigo = 3;
}

message FinalGradeRequest {
  string matricula_codigo = 1;
  string matricula_asignatura_codigo = 2;
}

message FinalGrade {
  string matricula_codigo = 1;
  string estudiante_id = 2;
  double nota_final = 3;
  double ponderacion_total = 4;
  string estado_academico = 5;
  bool publicada = 6;
  repeated Grade grades = 7;
  string matricula_asignatura_codigo = 8;
  string ciclo_acad_codigo = 9;
  string materia_codigo = 10;
  string paralelo_codigo = 11;
}

message FinalGradeResponse {
  FinalGrade final_grade = 1;
}

message CycleFinalSummaryRequest {
  string ciclo_acad_codigo = 1;
  string matricula_codigo = 2;
  string estudiante_id = 3;
  string estudiante_cedula = 4;
  bool solo_publicadas = 5;
}

message CycleFinalSummary {
  string ciclo_acad_codigo = 1;
  string matricula_codigo = 2;
  string estudiante_id = 3;
  string estudiante_cedula = 4;
  double promedio_final = 5;
  int32 materias = 6;
  int32 materias_calificadas = 7;
  repeated FinalGrade notas_finales = 8;
}

message CycleFinalSummaryResponse {
  CycleFinalSummary summary = 1;
}

message GenericResponse {
  bool success = 1;
  string message = 2;
  string affected_id = 3;
  int32 affected = 4;
}

message HealthResponse {
  string status = 1;
  string service = 2;
  string timestamp = 3;
  double uptime = 4;
}

message ReadyResponse {
  bool ready = 1;
  string timestamp = 2;
}

message LiveResponse {
  bool alive = 1;
  string timestamp = 2;
  double uptime = 3;
}

service GradingService {
  rpc CreateEvaluationComponent(CreateEvaluationComponentRequest) returns (EvaluationComponentResponse) {}
  rpc UpdateEvaluationComponent(UpdateEvaluationComponentRequest) returns (EvaluationComponentResponse) {}
  rpc ListEvaluationComponents(ListEvaluationComponentsRequest) returns (ListEvaluationComponentsResponse) {}
  rpc DisableEvaluationComponent(ComponentIdRequest) returns (GenericResponse) {}
  rpc CreateMatriculaAsignatura(CreateMatriculaAsignaturaRequest) returns (MatriculaAsignaturaResponse) {}
  rpc ListMatriculaAsignaturas(ListMatriculaAsignaturasRequest) returns (ListMatriculaAsignaturasResponse) {}
  rpc RegisterGrade(RegisterGradeRequest) returns (GradeResponse) {}
  rpc UpdateGrade(UpdateGradeRequest) returns (GradeResponse) {}
  rpc GetGrade(GradeIdRequest) returns (GradeResponse) {}
  rpc ListGrades(ListGradesRequest) returns (ListGradesResponse) {}
  rpc PublishGrades(PublishGradesRequest) returns (GenericResponse) {}
  rpc GetFinalGrade(FinalGradeRequest) returns (FinalGradeResponse) {}
  rpc GetCycleFinalSummary(CycleFinalSummaryRequest) returns (CycleFinalSummaryResponse) {}
}

service HealthService {
  rpc Health(Empty) returns (HealthResponse) {}
  rpc Ready(Empty) returns (ReadyResponse) {}
  rpc Live(Empty) returns (LiveResponse) {}
}
